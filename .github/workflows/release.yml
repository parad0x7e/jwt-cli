name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: jwt_cli-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: jwt_cli-linux-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: 386
            asset_name: jwt_cli-linux-386
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: jwt_cli-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: jwt_cli-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: jwt_cli-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: 386
            asset_name: jwt_cli-windows-386.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          if [ "$GOOS" = "windows" ]; then
            go build -o dist/${{ matrix.asset_name }} -ldflags="-s -w" .
          else
            go build -o dist/${{ matrix.asset_name }} -ldflags="-s -w" .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
